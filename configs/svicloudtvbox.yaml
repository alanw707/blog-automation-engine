# -- Storage ------------------------------------------------------------------
storage:
  db_path: "data/posts_history.db"

# -- Notifications ------------------------------------------------------------
notifications:
  provider: "brevo"
  recipients: ["blogger@svicloudtvbox.us", "admin@svicloudtvbox.us"]
  brevo:
    api_base: "https://api.brevo.com/v3/smtp/email"
    sender_email: "blogger@svicloudtvbox.us"
    sender_name: "SVICLOUD TV blogger"
    api_key_env: "BREVO_API_KEY"

# -- Monitoring ---------------------------------------------------------------
monitoring:
  log_level: "INFO"
  log_path: "logs/automation.log"

# -- Safety -------------------------------------------------------------------
safety:
  dry_run: false
  emergency_stop_file: "EMERGENCY_STOP"
  fuzzy_title_threshold: 0.82
